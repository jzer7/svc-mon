name: Continuous Integration - Go
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit binary build
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.24, stable]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read

    steps:

      - name: Install Taskfile
        uses: go-task/setup-task@v1
        with:
          version: 3.45.x

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Check out the code
        uses: actions/checkout@v4

      - name: Prepare environment
        run: task setup

      - name: Perform codebase health checks
        run: task validate

      - name: Build binaries
        run: task build
