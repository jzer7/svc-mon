---
name: Test, Build, and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Health checks for markdown files:
  # - Lint markdown files
  # - Check for broken links (60 seconds timeout per link)
  #
  # Runs on push if any .md file is modified or on any pull request
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      (github.event_name == 'push' && contains(github.event.head_commit.modified, '.md')) ||
      (github.event_name == 'pull_request')

    steps:
      - uses: actions/checkout@v6

      - uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: '**.md'
        continue-on-error: true

      - uses: JustinBeckwith/linkinator-action@v2
        with:
          paths: '**.md'
          timeout: 60000
        continue-on-error: true

  # Static analysis for Go code:
  # - Check code formatting
  # - Lint code
  lint-go:
    name: Lint Go Code
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: go.mod

      - name: Install Taskfile
        uses: go-task/setup-task@v2
        with:
          version: 3.46.x

      - name: Prepare environment
        run: task setup

      - name: Check formatting
        run: task format:check

      - name: Static analysis
        run: task lint

  # Test artifacts
  # - Unit tests
  # - Integration tests
  # - Build binaries
  # - E2E tests
  #
  # Runs on Ubuntu and macOS
  test:
    name: Test project
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version-file: go.mod

      - name: Install Taskfile
        uses: go-task/setup-task@v2
        with:
          version: 3.46.x

      - name: Prepare environment
        run: task setup

      - name: Unit tests
        run: task test:unit

      - name: Integration tests
        run: task test:integration

      - name: Build
        run: task build

      - name: End-to-end tests
        run: task test:e2e

      - name: Rename binaries with platform suffix
        run: |
          mv bin/svc-mon bin/svc-mon-${{ matrix.platform }}-${{ matrix.arch }}
          mv bin/webhook-logger bin/webhook-logger-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.platform }}-${{ matrix.arch }}
          path: bin/*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs:
      - lint-markdown
      - lint-go
      - test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Download Linux binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries-linux-amd64
          path: release/

      - name: Download macOS binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries-darwin-arm64
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
